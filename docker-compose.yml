services:
  mongo:
    image: mongo:7
    ports:
      - "27023:27017"
    volumes:
      - stock_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "6024:6024"
    environment:
      PORT: 6024
      MONGODB_URI: mongodb://mongo:27017/stockledger
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  stock_mongo:
